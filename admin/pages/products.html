<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm — LIS Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="main">
  <div class="topbar">
    <span class="topbar-title">Quản lý sản phẩm</span>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openModal()">+ Thêm sản phẩm</button>
      <span class="admin-badge" data-admin-name>Admin</span>
    </div>
  </div>
  <div class="content">
    <div class="panel">
      <div class="panel-header">
        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Tìm sản phẩm..." oninput="debounceSearch()">
            <button>🔍</button>
          </div>
          <select class="filter-select" id="cat-filter" onchange="loadProducts()">
            <option value="">Tất cả danh mục</option>
            <option value="vo-the-thao">Vớ thể thao</option>
            <option value="vo-bong-da">Vớ bóng đá</option>
            <option value="combo">Combo</option>
          </select>
        </div>
        <span id="product-count" style="font-size:13px;color:var(--gray)"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ảnh</th>
              <th>Tên sản phẩm</th>
              <th>Danh mục</th>
              <th>Giá bán</th>
              <th>Giá gốc</th>
              <th>Tồn kho</th>
              <th>Nổi bật</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="products-body">
            <tr><td colspan="9" style="text-align:center;color:var(--gray);padding:40px">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Product modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Thêm sản phẩm</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="product-form" onsubmit="saveProduct(event)">
        <div class="form-grid">
          <div class="form-group full">
            <label>Tên sản phẩm *</label>
            <input type="text" id="f-name" class="input" placeholder="Vớ Thể Thao LIS Pro..." required>
          </div>
          <div class="form-group full">
            <label>Mô tả</label>
            <textarea id="f-desc" placeholder="Mô tả chi tiết sản phẩm..."></textarea>
          </div>
          <div class="form-group">
            <label>Giá gốc (đ) *</label>
            <input type="number" id="f-price" class="input" placeholder="89000" min="0" required>
          </div>
          <div class="form-group">
            <label>Giá khuyến mãi (đ)</label>
            <input type="number" id="f-sale-price" class="input" placeholder="69000 (để 0 nếu không có)" min="0">
          </div>
          <div class="form-group">
            <label>Danh mục</label>
            <select id="f-category" class="input">
              <option value="vo-the-thao">Vớ thể thao</option>
              <option value="vo-bong-da">Vớ bóng đá</option>
              <option value="combo">Combo tiết kiệm</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tồn kho</label>
            <input type="number" id="f-stock" class="input" placeholder="100" min="0">
          </div>
          <div class="form-group full">
            <label>Màu sắc (mỗi màu 1 dòng)</label>
            <textarea id="f-colors" placeholder="Đen&#10;Trắng&#10;Navy&#10;Đỏ" style="min-height:80px"></textarea>
          </div>
          <div class="form-group full">
            <label>Size (mỗi size 1 dòng)</label>
            <textarea id="f-sizes" placeholder="S (35-38)&#10;M (39-42)&#10;L (43-45)" style="min-height:80px"></textarea>
          </div>
          <div class="form-group full">
            <label>Ảnh sản phẩm</label>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
              <div style="font-size:24px">📷</div>
              <p>Click để chọn ảnh (JPG, PNG, WebP — tối đa 5MB)</p>
            </div>
            <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this)">
            <div class="preview-imgs" id="preview-imgs"></div>
            <input type="hidden" id="f-images" value="[]">
          </div>
          <div class="form-group" style="flex-direction:row;align-items:center;gap:10px">
            <input type="checkbox" id="f-featured" style="width:16px;height:16px;accent-color:var(--gold)">
            <label for="f-featured" style="margin:0;cursor:pointer">Đánh dấu sản phẩm nổi bật</label>
          </div>
          <div class="form-group" style="flex-direction:row;align-items:center;gap:10px">
            <input type="checkbox" id="f-active" style="width:16px;height:16px;accent-color:var(--gold)" checked>
            <label for="f-active" style="margin:0;cursor:pointer">Hiển thị trên cửa hàng</label>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="document.getElementById('product-form').requestSubmit()" id="save-btn">Lưu sản phẩm</button>
    </div>
  </div>
</div>

<script src="../js/admin.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  let editId = null;
  let uploadedImages = [];
  let searchTimer;

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadProducts, 350);
  }

  async function loadProducts() {
    const search = document.getElementById('search-input').value;
    const cat    = document.getElementById('cat-filter').value;
    let url = '/api/products?limit=50&is_active_all=1';
    if (cat)    url += `&category=${cat}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;

    try {
      const { data, total } = await API.get(url);
      document.getElementById('product-count').textContent = `${total} sản phẩm`;

      const tbody = document.getElementById('products-body');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">📦</div><p>Chưa có sản phẩm nào</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td>
            <div class="td-img">
              ${p.images?.[0] ? `<img src="${API_BASE}/${p.images[0]}" alt="">` : '🧦'}
            </div>
          </td>
          <td>
            <div style="font-weight:600;max-width:220px">${p.name}</div>
            <div style="font-size:11px;color:var(--gray);font-family:monospace">${p.slug}</div>
          </td>
          <td style="font-size:12px;color:var(--gray)">${p.category.replace(/-/g,' ')}</td>
          <td style="font-weight:700;color:var(--gold)">${fmt.price(p.display_price)}</td>
          <td style="font-size:12px;color:var(--gray)">${p.original_price ? fmt.price(p.original_price) : '—'}</td>
          <td>
            <span style="color:${p.stock <= 10 ? 'var(--red)' : p.stock <= 30 ? '#d29922' : 'var(--green)'};font-weight:700">${p.stock}</span>
          </td>
          <td style="text-align:center">${p.is_featured ? '⭐' : '—'}</td>
          <td>
            <span style="font-size:12px;padding:3px 10px;border-radius:12px;${p.is_active ? 'background:rgba(63,185,80,.12);color:#3fb950' : 'background:rgba(248,81,73,.12);color:#f85149'}">
              ${p.is_active ? 'Hiển thị' : 'Ẩn'}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="editProduct(${p.id})" title="Chỉnh sửa">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g,'\\\'')}')" title="Ẩn">🗑</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      toast('Lỗi tải sản phẩm: ' + e.message, 'error');
    }
  }

  function openModal(product = null) {
    editId = product?.id || null;
    document.getElementById('modal-title').textContent = editId ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới';
    uploadedImages = [];

    // Reset form
    document.getElementById('f-name').value       = product?.name || '';
    document.getElementById('f-desc').value       = product?.description || '';
    document.getElementById('f-price').value      = product?.price || '';
    document.getElementById('f-sale-price').value = product?.sale_price || 0;
    document.getElementById('f-category').value   = product?.category || 'vo-the-thao';
    document.getElementById('f-stock').value      = product?.stock || 0;
    document.getElementById('f-colors').value     = (product?.colors || []).join('\n');
    document.getElementById('f-sizes').value      = (product?.sizes || []).join('\n');
    document.getElementById('f-featured').checked = !!product?.is_featured;
    document.getElementById('f-active').checked   = product ? !!product.is_active : true;

    // Images
    uploadedImages = product?.images || [];
    document.getElementById('f-images').value = JSON.stringify(uploadedImages);
    renderPreviews();

    document.getElementById('product-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('product-modal').classList.remove('open');
    editId = null;
  }

  async function editProduct(id) {
    try {
      const { data } = await API.get(`/api/products/${id}`);
      openModal(data);
    } catch (e) { toast('Lỗi: ' + e.message, 'error'); }
  }

  async function deleteProduct(id, name) {
    if (!confirm(`Ẩn sản phẩm "${name}"?\n(Sản phẩm sẽ bị ẩn khỏi cửa hàng)`)) return;
    try {
      await API.delete(`/api/products/${id}`);
      toast('Đã ẩn sản phẩm', 'success');
      loadProducts();
    } catch (e) { toast('Lỗi: ' + e.message, 'error'); }
  }

  async function saveProduct(e) {
    e.preventDefault();
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Đang lưu...';

    const body = {
      name:        document.getElementById('f-name').value,
      description: document.getElementById('f-desc').value,
      price:       parseInt(document.getElementById('f-price').value),
      sale_price:  parseInt(document.getElementById('f-sale-price').value) || 0,
      category:    document.getElementById('f-category').value,
      stock:       parseInt(document.getElementById('f-stock').value) || 0,
      colors:      document.getElementById('f-colors').value.split('\n').map(s=>s.trim()).filter(Boolean),
      sizes:       document.getElementById('f-sizes').value.split('\n').map(s=>s.trim()).filter(Boolean),
      images:      uploadedImages,
      is_featured: document.getElementById('f-featured').checked ? 1 : 0,
      is_active:   document.getElementById('f-active').checked ? 1 : 0,
    };

    try {
      if (editId) {
        await API.put(`/api/products/${editId}`, body);
        toast('Cập nhật sản phẩm thành công ✅', 'success');
      } else {
        await API.post('/api/products', body);
        toast('Thêm sản phẩm thành công ✅', 'success');
      }
      closeModal();
      loadProducts();
    } catch (e) {
      toast('Lỗi: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Lưu sản phẩm';
    }
  }

  // ── Image upload ──
  async function handleFileSelect(input) {
    const files = Array.from(input.files);
    for (const file of files) {
      try {
        const url = await uploadImage(file);
        uploadedImages.push(url);
        renderPreviews();
        toast('Upload ảnh thành công', 'success');
      } catch (e) {
        toast('Upload thất bại: ' + e.message, 'error');
      }
    }
    document.getElementById('f-images').value = JSON.stringify(uploadedImages);
    input.value = '';
  }

  function renderPreviews() {
    const container = document.getElementById('preview-imgs');
    container.innerHTML = uploadedImages.map((url, i) => `
      <div class="preview-img">
        <img src="${API_BASE}/${url}" alt="">
        <button class="del" onclick="removeImage(${i})">✕</button>
      </div>
    `).join('');
  }

  function removeImage(idx) {
    uploadedImages.splice(idx, 1);
    document.getElementById('f-images').value = JSON.stringify(uploadedImages);
    renderPreviews();
  }

  // Drag & drop upload
  const zone = document.getElementById('upload-zone');
  zone?.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone?.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone?.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const input = document.getElementById('file-input');
    // Simulate file selection
    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
    input.files = dt.files;
    handleFileSelect(input);
  });

  // Close modal on backdrop
  document.getElementById('product-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Check URL params
  if (new URLSearchParams(location.search).get('action') === 'add') {
    document.addEventListener('DOMContentLoaded', () => openModal());
  }

  document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
