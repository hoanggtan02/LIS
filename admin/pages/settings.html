<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài đặt — LIS Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="main">
  <div class="topbar">
    <span class="topbar-title">Cài đặt cửa hàng</span>
    <div class="topbar-right"><span class="admin-badge" data-admin-name>Admin</span></div>
  </div>
  <div class="content" style="max-width:700px">

    <div class="panel" style="margin-bottom:20px">
      <div class="panel-header"><span class="panel-title">Thông tin cửa hàng</span></div>
      <div class="panel-body">
        <form id="settings-form" onsubmit="saveSettings(event)">
          <div class="form-grid">
            <div class="form-group full">
              <label>Tên cửa hàng</label>
              <input type="text" id="s-store-name" class="input" placeholder="LIS — Life is Sport">
            </div>
            <div class="form-group">
              <label>Số điện thoại</label>
              <input type="text" id="s-phone" class="input" placeholder="0901234567">
            </div>
            <div class="form-group">
              <label>Zalo</label>
              <input type="text" id="s-zalo" class="input" placeholder="0901234567">
            </div>
            <div class="form-group full">
              <label>Địa chỉ</label>
              <input type="text" id="s-address" class="input" placeholder="TP. Hồ Chí Minh">
            </div>
            <div class="form-group">
              <label>Phí vận chuyển (đ)</label>
              <input type="number" id="s-shipping-fee" class="input" placeholder="30000" min="0">
            </div>
            <div class="form-group">
              <label>Miễn phí vận chuyển từ (đ)</label>
              <input type="number" id="s-free-threshold" class="input" placeholder="300000" min="0">
            </div>
            <div class="form-group full">
              <label>Nội dung banner thông báo</label>
              <input type="text" id="s-banner" class="input" placeholder="Miễn phí vận chuyển cho đơn từ 300K · Đổi trả 7 ngày">
            </div>
          </div>
          <div style="margin-top:20px">
            <button type="submit" class="btn btn-primary" id="save-settings-btn">💾 Lưu cài đặt</button>
          </div>
        </form>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Đổi mật khẩu admin</span></div>
      <div class="panel-body">
        <form onsubmit="changePassword(event)">
          <div class="form-grid">
            <div class="form-group full">
              <label>Mật khẩu hiện tại</label>
              <input type="password" id="old-pw" class="input" required>
            </div>
            <div class="form-group">
              <label>Mật khẩu mới</label>
              <input type="password" id="new-pw" class="input" minlength="8" required>
            </div>
            <div class="form-group">
              <label>Xác nhận mật khẩu mới</label>
              <input type="password" id="confirm-pw" class="input" required>
            </div>
          </div>
          <div style="margin-top:20px">
            <button type="submit" class="btn btn-secondary">🔒 Đổi mật khẩu</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<script src="../js/admin.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', loadSettings);

  async function loadSettings() {
    try {
      const { data } = await API.get('/api/settings');
      document.getElementById('s-store-name').value   = data.store_name    || '';
      document.getElementById('s-phone').value        = data.store_phone   || '';
      document.getElementById('s-zalo').value         = data.store_zalo    || '';
      document.getElementById('s-address').value      = data.store_address || '';
      document.getElementById('s-shipping-fee').value = data.shipping_fee  || 30000;
      document.getElementById('s-free-threshold').value = data.free_shipping_threshold || 300000;
      document.getElementById('s-banner').value       = data.banner_text   || '';
    } catch (e) {
      toast('Lỗi tải cài đặt: ' + e.message, 'error');
    }
  }

  async function saveSettings(e) {
    e.preventDefault();
    const btn = document.getElementById('save-settings-btn');
    btn.disabled = true; btn.textContent = 'Đang lưu...';
    try {
      await API.put('/api/settings', {
        store_name:              document.getElementById('s-store-name').value,
        store_phone:             document.getElementById('s-phone').value,
        store_zalo:              document.getElementById('s-zalo').value,
        store_address:           document.getElementById('s-address').value,
        shipping_fee:            document.getElementById('s-shipping-fee').value,
        free_shipping_threshold: document.getElementById('s-free-threshold').value,
        banner_text:             document.getElementById('s-banner').value,
      });
      toast('Đã lưu cài đặt ✅', 'success');
    } catch (e) {
      toast('Lỗi: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '💾 Lưu cài đặt';
    }
  }

  async function changePassword(e) {
    e.preventDefault();
    const oldPw = document.getElementById('old-pw').value;
    const newPw = document.getElementById('new-pw').value;
    const confirmPw = document.getElementById('confirm-pw').value;

    if (newPw !== confirmPw) { toast('Mật khẩu xác nhận không khớp', 'error'); return; }
    if (newPw.length < 8)    { toast('Mật khẩu tối thiểu 8 ký tự', 'error'); return; }

    try {
      await API.put('/api/admin/password', { old_password: oldPw, new_password: newPw });
      toast('Đổi mật khẩu thành công ✅', 'success');
      document.getElementById('old-pw').value = '';
      document.getElementById('new-pw').value = '';
      document.getElementById('confirm-pw').value = '';
    } catch (e) {
      toast('Lỗi: ' + e.message, 'error');
    }
  }
</script>
</body>
</html>
