<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm — LIS Sport</title>
  <link rel="icon" href="../assets/logo_lis.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding-top: 68px; }
    .page-hero { background:linear-gradient(180deg,var(--navy2) 0%,var(--navy) 100%); padding:48px 32px 40px; border-bottom:1px solid rgba(255,255,255,.05); }
    .page-hero-inner { max-width:1200px; margin:0 auto; }
    .breadcrumb { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--gray); margin-bottom:16px; }
    .breadcrumb a { color:var(--gray); transition:color .2s; }
    .breadcrumb a:hover { color:var(--gold); }
    .breadcrumb span { opacity:.4; }
    .page-hero h1 { font-family:'Barlow Condensed',sans-serif; font-size:clamp(36px,6vw,72px); font-weight:900; text-transform:uppercase; line-height:.95; }
    .page-hero h1 em { font-style:normal; color:var(--gold); }

    .shop-wrap { max-width:1200px; margin:0 auto; padding:40px 32px 80px; display:grid; grid-template-columns:220px 1fr; gap:36px; align-items:start; }

    /* Sidebar */
    .sidebar { background:var(--navy2); border:1px solid rgba(255,255,255,.06); border-radius:var(--r); padding:24px; position:sticky; top:88px; }
    .sidebar-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:20px; }
    .filter-section { margin-bottom:24px; }
    .filter-section h4 { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.4); font-weight:600; margin-bottom:10px; }
    .filter-chip { display:block; width:100%; text-align:left; background:transparent; border:1px solid rgba(255,255,255,.07); color:rgba(255,255,255,.55); padding:9px 14px; border-radius:4px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; margin-bottom:6px; transition:var(--trans); }
    .filter-chip:hover, .filter-chip.active { background:rgba(245,166,35,.1); border-color:rgba(245,166,35,.4); color:var(--gold); }

    /* Main */
    .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .result-count { font-size:13px; color:var(--gray); }
    .search-wrap { display:flex; gap:0; flex:1; max-width:320px; }
    .search-wrap input { flex:1; background:var(--navy2); border:1px solid rgba(255,255,255,.1); border-right:none; color:#fff; padding:10px 16px; border-radius:4px 0 0 4px; font-size:13px; font-family:'DM Sans',sans-serif; }
    .search-wrap input:focus { outline:none; border-color:var(--gold); }
    .search-wrap button { background:var(--gold); color:var(--navy); border:none; padding:10px 18px; border-radius:0 4px 4px 0; font-weight:700; font-size:13px; cursor:pointer; }
    .no-result { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--gray); }

    @media (max-width:800px) {
      .shop-wrap { grid-template-columns:1fr; padding:20px; }
      .sidebar { position:static; }
      .page-hero { padding:30px 20px 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">
      <img src="../assets/logo_lis.png" alt="LIS" onerror="this.style.display='none'">
      <div class="nav-logo-text"><span class="brand">LIS</span><span class="sub">Life is Sport</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Trang chủ</a></li>
      <li><a href="products.html" class="active">Sản phẩm</a></li>
    </ul>
    <div class="nav-right">
      <a href="cart.html" class="cart-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span data-cart-count style="display:none">0</span>
      </a>
      <a href="checkout.html" class="btn-nav">Đặt hàng</a>
    </div>
  </div>
</header>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="breadcrumb">
      <a href="../index.html">Trang chủ</a><span>/</span><span>Sản phẩm</span>
    </div>
    <h1>TẤT CẢ<br><em>SẢN PHẨM</em></h1>
  </div>
</div>

<div class="shop-wrap">
  <!-- Sidebar filters -->
  <aside class="sidebar">
    <div class="sidebar-title">Bộ lọc</div>
    <div class="filter-section">
      <h4>Danh mục</h4>
      <button class="filter-chip active" data-cat="" onclick="applyFilter(this,'')">Tất cả</button>
      <button class="filter-chip" data-cat="vo-the-thao" onclick="applyFilter(this,'vo-the-thao')">Vớ thể thao</button>
      <button class="filter-chip" data-cat="vo-bong-da" onclick="applyFilter(this,'vo-bong-da')">Vớ bóng đá</button>
      <button class="filter-chip" data-cat="combo" onclick="applyFilter(this,'combo')">Combo tiết kiệm</button>
    </div>
    <div class="filter-section">
      <h4>Lọc nhanh</h4>
      <button class="filter-chip" onclick="toggleFeatured(this)">⭐ Bán chạy</button>
    </div>
  </aside>

  <!-- Products -->
  <div>
    <div class="toolbar">
      <span class="result-count" id="result-count">Đang tải...</span>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Tìm sản phẩm..." oninput="debounceSearch()">
        <button onclick="loadProducts()">🔍</button>
      </div>
    </div>
    <div class="product-grid" id="products-grid">
      <div class="skeleton" style="height:320px;border-radius:6px"></div>
      <div class="skeleton" style="height:320px;border-radius:6px"></div>
      <div class="skeleton" style="height:320px;border-radius:6px"></div>
      <div class="skeleton" style="height:320px;border-radius:6px"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-bottom" style="max-width:1200px;margin:0 auto">
    <p>© 2025 Life is Sport — LIS</p>
    <p>Hàng chính hãng · Đổi trả 7 ngày</p>
  </div>
</footer>

<script src="../js/api.js"></script>
<script>
  let currentCat = new URLSearchParams(location.search).get('category') || '';
  let currentSearch = '';
  let featuredOnly = false;
  let searchTimer;

  // Set active filter nếu có query param
  if (currentCat) {
    document.querySelectorAll('.filter-chip[data-cat]').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === currentCat);
    });
  }

  function applyFilter(el, cat) {
    document.querySelectorAll('.filter-chip[data-cat]').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCat = cat;
    loadProducts();
  }

  function toggleFeatured(el) {
    featuredOnly = !featuredOnly;
    el.classList.toggle('active', featuredOnly);
    loadProducts();
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentSearch = document.getElementById('search-input').value; loadProducts(); }, 350);
  }

  async function loadProducts() {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = `<div class="skeleton" style="height:320px;border-radius:6px"></div>`.repeat(4);
    try {
      const params = { limit: 50 };
      if (currentCat) params.category = currentCat;
      if (featuredOnly) params.featured = 1;
      if (currentSearch) params.search = currentSearch;

      const { data, total } = await API.products.list(params);
      document.getElementById('result-count').textContent = `${total} sản phẩm`;

      if (!data.length) {
        grid.innerHTML = '<div class="no-result">Không tìm thấy sản phẩm nào 😢</div>';
        return;
      }

      grid.innerHTML = data.map(p => `
        <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
          <div class="product-card-img">
            ${p.images?.[0] ? `<img src="${API_BASE}/${p.images[0]}" alt="${p.name}" loading="lazy">` : '<span style="font-size:64px">🧦</span>'}
            ${p.discount_pct > 0 ? `<span class="badge-sale">-${p.discount_pct}%</span>` : ''}
            ${p.is_featured ? '<span class="badge-featured">Hot</span>' : ''}
          </div>
          <div class="product-card-body">
            <div class="product-card-cat">${p.category.replace(/-/g,' ')}</div>
            <div class="product-card-name">${p.name}</div>
            <div class="product-card-price">
              <span class="price-main">${fmt.price(p.display_price)}</span>
              ${p.original_price ? `<span class="price-old">${fmt.price(p.original_price)}</span>` : ''}
            </div>
          </div>
          <div class="product-card-footer">
            <button class="btn btn-gold btn-sm" style="flex:1" onclick="event.stopPropagation();location.href='product.html?id=${p.id}'">Xem chi tiết</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      grid.innerHTML = '<div class="no-result">Lỗi tải sản phẩm. Vui lòng thử lại.</div>';
    }
  }

  loadProducts();
</script>
</body>
</html>
